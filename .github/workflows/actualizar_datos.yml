name: Actualización Diaria - Mercado Ibérico

on:
  # Ejecutar cada día a las 9:00 AM hora de Madrid (UTC+2 en verano = 07:00 UTC)
  schedule:
    - cron: '0 7 * * 1-5'  # Lunes a viernes a las 07:00 UTC (09:00 Madrid)

  # Permitir ejecución manual desde GitHub
  workflow_dispatch:
    inputs:
      modo:
        description: 'Modo de ejecución'
        required: true
        default: 'actualizar'
        type: choice
        options:
          - actualizar
          - historico_completo

jobs:
  actualizar-datos:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Descargar el código del repositorio
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Configurar Python
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Instalar dependencias
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Ejecutar script maestro
      - name: ⚡ Ejecutar actualización de datos
        run: |
          python scripts/03_actualizar_todo.py

      # 5. Subir los CSV actualizados al repositorio
      - name: 💾 Guardar datos actualizados en GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/* logs/*.log
          git diff --staged --quiet || git commit -m "🔄 Datos actualizados: $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. Notificar si hay error
      - name: ❌ Notificar error (si falla)
        if: failure()
        run: |
          echo "El workflow falló. Revisa los logs en GitHub Actions."
